<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snare Batch</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffaf2;
      --ink: #16120d;
      --muted: #74675b;
      --line: #d7c8b6;
      --ref: #2a5c71;
      --play: #b35335;
      --up: #2e7d58;
      --down: #8d3a32;
      --neutral: #cab8a4;
      --selected-ring: #17130f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Iowan Old Style", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fff7eb, transparent 30%),
        linear-gradient(180deg, #faf3e8 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 48px);
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      color: white;
      font: inherit;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .ref { background: var(--ref); }
    .play { background: var(--play); }
    .submit { background: #111; }
    .thumb {
      color: var(--ink);
      background: #f3e8d9;
      border: 1px solid var(--line);
    }
    .thumb.selected-up {
      color: white;
      background: var(--up);
      box-shadow: 0 0 0 2px var(--selected-ring);
    }
    .thumb.selected-down {
      color: white;
      background: var(--down);
      box-shadow: 0 0 0 2px var(--selected-ring);
    }
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
      margin-left: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
      gap: 14px;
    }
    .card {
      background: rgba(255, 250, 242, 0.96);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 28px rgba(69, 45, 26, 0.06);
    }
    .small {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 8px;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    textarea {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: #fffefb;
      color: var(--ink);
      font: 14px/1.45 Georgia, "Iowan Old Style", serif;
    }
    .footer {
      margin-top: 20px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }
    .status {
      min-height: 20px;
      margin-top: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Snare RLHF Batch</h1>
    <p>Fixed target controls. Listen to reference then variant, mark thumbs up or down, and submit the whole batch.</p>

    <div class="toolbar">
      <button class="ref" id="play-reference">Play Reference</button>
      <button class="submit" id="submit">Submit Batch</button>
      <div class="stats">
        <span id="batch-name">Loading…</span>
        <span id="counts"></span>
      </div>
    </div>

    <div class="grid" id="cards"></div>

    <section class="footer">
      <textarea id="batch-notes" placeholder="Overall notes about the batch: what the positive examples have in common, what the negative examples get wrong, where the surface feels promising."></textarea>
      <div class="status" id="status"></div>
    </section>
  </main>

  <audio id="audio-reference" preload="auto"></audio>

  <script>
    const MANIFEST_PATH = "snr_batch_100/manifest.json";
    const statusEl = document.getElementById("status");
    const countsEl = document.getElementById("counts");
    const batchNameEl = document.getElementById("batch-name");
    const cardsEl = document.getElementById("cards");
    const referenceAudio = document.getElementById("audio-reference");
    const audioMap = new Map();

    let manifest = null;
    const ratings = new Map();

    function batchKey(suffix) {
      return `snr-batch:${manifest.batch_id}:${suffix}`;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function playPath(path) {
      const audio = audioMap.get(path);
      if (!audio) throw new Error(`Missing audio ${path}`);
      audio.pause();
      audio.currentTime = 0;
      const maybePromise = audio.play();
      if (maybePromise) await maybePromise;
      return audio;
    }

    async function playSequence(paths) {
      try {
        setStatus("Playing…");
        for (const path of paths) {
          const audio = await playPath(path);
          await new Promise((resolve) => {
            const done = () => {
              audio.removeEventListener("ended", done);
              window.setTimeout(resolve, 180);
            };
            audio.addEventListener("ended", done, { once: true });
          });
        }
        setStatus("");
      } catch (error) {
        setStatus(error.message);
      }
    }

    function updateCounts() {
      let up = 0;
      let down = 0;
      for (const value of ratings.values()) {
        if (value === "up") up += 1;
        if (value === "down") down += 1;
      }
      countsEl.textContent = `${up} up, ${down} down, ${manifest.variants.length - up - down} unrated`;
    }

    function persistRating(id, value) {
      ratings.set(id, value);
      localStorage.setItem(batchKey(`rating:${id}`), value || "");
      updateCounts();
    }

    function hydrateRating(id) {
      const saved = localStorage.getItem(batchKey(`rating:${id}`));
      if (saved === "up" || saved === "down") {
        ratings.set(id, saved);
      }
    }

    function applyThumbState(card, value) {
      const up = card.querySelector('[data-thumb="up"]');
      const down = card.querySelector('[data-thumb="down"]');
      up.classList.toggle("selected-up", value === "up");
      down.classList.toggle("selected-down", value === "down");
    }

    function variantPath(variant) {
      return `snr_batch_100/${variant.wav}`;
    }

    function buildSubmitText() {
      const payload = {
        batch_id: manifest.batch_id,
        title: manifest.title,
        conditioning: manifest.conditioning,
        notes: document.getElementById("batch-notes").value.trim(),
        ratings: manifest.variants.map((variant) => ({
          index: variant.index,
          id: variant.id,
          label: variant.label,
          decision: ratings.get(variant.id) || "skip",
          wav: variant.wav,
          params: variant.params,
          grid: variant.grid,
          notes: (document.getElementById(`notes-${variant.id}`)?.value || "").trim(),
        })),
      };
      return JSON.stringify(payload, null, 2);
    }

    async function submitBatch() {
      try {
        const response = await fetch("/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: buildSubmitText() }),
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Submit failed");
        setStatus(`Saved ${payload.path}`);
      } catch (error) {
        setStatus(error.message);
      }
    }

    function buildCard(variant) {
      hydrateRating(variant.id);
      const card = document.createElement("section");
      card.className = "card";
      const noteId = `notes:${variant.id}`;
      const savedNotes = localStorage.getItem(batchKey(noteId)) || "";
      card.innerHTML = `
        <div class="small">${variant.id}</div>
        <h2>${variant.label}</h2>
        <div class="meta">
          osc1 ${variant.params.fit_osc1_base_hz.toFixed(3)} Hz<br>
          osc2 ${variant.params.fit_osc2_base_hz.toFixed(3)} Hz
        </div>
        <div class="row">
          <button class="ref" data-action="ab">Ref then Variant</button>
          <button class="play" data-action="b">Play Variant</button>
        </div>
        <div class="row">
          <button class="thumb" data-thumb="up">Thumb Up</button>
          <button class="thumb" data-thumb="down">Thumb Down</button>
        </div>
        <textarea id="notes-${variant.id}" placeholder="Optional notes for this variant.">${savedNotes}</textarea>
      `;

      const textarea = card.querySelector("textarea");
      textarea.addEventListener("input", () => {
        localStorage.setItem(batchKey(noteId), textarea.value);
      });

      card.querySelector('[data-action="ab"]').addEventListener("click", () => {
        playSequence([manifest.reference, variantPath(variant)]);
      });
      card.querySelector('[data-action="b"]').addEventListener("click", () => {
        playSequence([variantPath(variant)]);
      });

      card.querySelector('[data-thumb="up"]').addEventListener("click", () => {
        const next = ratings.get(variant.id) === "up" ? "" : "up";
        persistRating(variant.id, next);
        applyThumbState(card, next);
      });
      card.querySelector('[data-thumb="down"]').addEventListener("click", () => {
        const next = ratings.get(variant.id) === "down" ? "" : "down";
        persistRating(variant.id, next);
        applyThumbState(card, next);
      });

      applyThumbState(card, ratings.get(variant.id) || "");
      return card;
    }

    async function loadManifest() {
      const response = await fetch(MANIFEST_PATH, { cache: "no-store" });
      if (!response.ok) throw new Error("Failed to load manifest");
      manifest = await response.json();

      batchNameEl.textContent = `${manifest.title} · ${manifest.variants.length} variants`;
      referenceAudio.src = `snr_batch_100/${manifest.reference}`;
      audioMap.set(manifest.reference, referenceAudio);

      const savedBatchNotes = localStorage.getItem(batchKey("batch-notes"));
      if (savedBatchNotes) {
        document.getElementById("batch-notes").value = savedBatchNotes;
      }
      document.getElementById("batch-notes").addEventListener("input", (event) => {
        localStorage.setItem(batchKey("batch-notes"), event.target.value);
      });

      for (const variant of manifest.variants) {
        const audio = document.createElement("audio");
        audio.preload = "auto";
        audio.src = variantPath(variant);
        audioMap.set(variantPath(variant), audio);
        document.body.appendChild(audio);
        cardsEl.appendChild(buildCard(variant));
      }
      updateCounts();
    }

    document.getElementById("play-reference").addEventListener("click", () => {
      if (!manifest) return;
      playSequence([manifest.reference]);
    });
    document.getElementById("submit").addEventListener("click", submitBatch);

    loadManifest().catch((error) => {
      setStatus(error.message);
    });
  </script>
</body>
</html>
